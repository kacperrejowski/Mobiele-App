    <div class="toptext">
        <h1>Recipes</h1>
    </div>

    <div class="ingredient-grid">
        <div class="ingredient-card">
            <div class="imag-wrap">
                <img src="images/mayonnaise.png" alt="A 1kg tub of mayonnaise">
                <div class="upper-amount">1 kg</div>
            </div>
            <h3>Mayonnaise</h3>
        </div>

        <div class="ingredient-card">
            <div class="imag-wrap">
                <img src="images/20-eggs.png" alt="A carton of 20 eggs">
                <div class="upper-amount">20 Eggs</div>
            </div>
            <h3>Eggs</h3>
        </div>

        <div class="ingredient-card">
            <div class="imag-wrap">
                <img src="images/surstromming.png" alt="Two cans of surströmming">
                <div class="upper-amount">2 cans</div>
            </div>
            <h3>Surströmming</h3>
        </div>

        <div class="ingredient-card">
            <div class="imag-wrap">
                <img src="images/rum.png" alt="A bottle of straw rum">
                <div class="upper-amount">500 ml</div>
            </div>
            <h3>Straw Rum</h3>
        </div>

        <div class="ingredient-card">
            <div class="imag-wrap">
                <img src="images/worcester.png" alt="A bottle of Worcestershire sauce">
                <div class="upper-amount">250 ml</div>
            </div>
            <h3>Worcestershire Sauce</h3>
        </div>

        <div class="ingredient-card">
            <div class="imag-wrap">
                <img src="images/chips.png" alt="Chips from the One Chip Challenge">
                <div class="upper-amount">5 Pieces</div>
            </div>
            <h3>One Chip Challenge Chips</h3>
        </div>

        <div class="ingredient-card">
            <div class="imag-wrap">
                <img src="images/cowtongue.png" alt="A whole cow tongue">
                <div class="upper-amount">1 kg</div>
            </div>
            <h3>Cow Tongue</h3>
        </div>
    </div>


`<div class="verdict-section">
